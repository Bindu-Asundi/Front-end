<!DOCTYPE html>
<html>
<head>
    <title>Video Tag Example</title>
</head>
<body>

    <h1>Beautiful Nature Video</h1>

    <p>
        This is an example of the HTML <strong>video</strong> tag.
        It is used to display videos directly on a web page.
    </p>

    <video width="600" height="350" controls>
        <source src="flower.mp4" type="video/mp4">
    </video>

</body>
</html>
